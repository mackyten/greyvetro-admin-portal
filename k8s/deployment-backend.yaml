apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-portal-backend
  namespace: greyvetro
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-portal-backend
  template:
    metadata:
      labels:
        app: admin-portal-backend
    spec:
      containers:
        - name: backend
          image: greyvetro/admin-portal-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: KEYCLOAK_URL
              value: http://keycloak.greyvetro.svc.cluster.local
            - name: KEYCLOAK_REALM
              value: greyvetro
            - name: KEYCLOAK_CLIENT_ID
              value: admin-portal
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: admin-portal-secrets
                  key: client-secret
            - name: CORS_ORIGINS
              value: https://admin.greyvetro.local
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
